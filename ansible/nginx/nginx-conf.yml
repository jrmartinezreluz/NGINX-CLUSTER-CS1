---
- name: Deploy main nginx.conf with conf.d and optional stream includes
  hosts: lb
  become: true

  tasks:
    - name: Ensure stream.d exists when MySQL stream is enabled
      file:
        path: /etc/nginx/stream.d
        state: directory
        mode: "0755"
      when: mysql_stream_enabled | bool

    - name: Render main nginx.conf
      template:
        src: nginx.conf.j2
        dest: /etc/nginx/nginx.conf
        mode: "0644"
        backup: true

    - name: Validate NGINX configuration
      command: nginx -t
      changed_when: false

    - name: Restart NGINX
      service:
        name: nginx
        state: restarted
