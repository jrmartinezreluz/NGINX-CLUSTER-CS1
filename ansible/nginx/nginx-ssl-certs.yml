---
- name: Copy TLS certificates for NGINX Plus
  hosts: lb
  become: true

  tasks:
    - name: Ensure SSL directory exists
      file:
        path: /etc/nginx/ssl
        state: directory
        mode: "0750"

    - name: Copy wildcard certificate
      copy:
        src: files/STAR.GHC.COM.crt
        dest: "{{ ssl_certificate }}"
        mode: "0644"
      when: ssl_cert_copy_enabled | default(true)

    - name: Copy private key
      copy:
        src: files/ghc.com.key
        dest: "{{ ssl_certificate_key }}"
        mode: "0600"
      when: ssl_cert_copy_enabled | default(true)
